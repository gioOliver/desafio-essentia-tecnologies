<div class="task-card" (click)="onClick()">
  <h3>{{ task.title }}</h3>
  <p>{{ task.description }}</p>

  <small>
    📅 Prazo: {{ task.dueDate | date:'dd/MM/yyyy':'America/Sao_Paulo' }}
  </small><br>

  <small>
    🕒 Criado: {{ task.createdAt | date:'dd/MM/yyyy HH:mm:ss':'America/Sao_Paulo' }}
  </small>
</div>
