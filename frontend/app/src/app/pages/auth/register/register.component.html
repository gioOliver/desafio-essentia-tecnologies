<div class="container">
  <div class="card">
    <h2>Criar Conta</h2>

    <input [(ngModel)]="name" placeholder="Nome" />
    <input [(ngModel)]="email" placeholder="Email" />
    <input [(ngModel)]="password" type="password" placeholder="Senha" />

    <button (click)="submit()">Cadastrar</button>
    <p class="register">
      <a routerLink="/">Já tenho conta</a>
    </p>
  </div>
</div>
