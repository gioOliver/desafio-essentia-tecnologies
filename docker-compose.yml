services:
  mysql:
    image: mysql:8.0
    container_name: techx_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "${DB_EXTERNAL_PORT}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: techx_backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DATABASE_URL: mysql://root:root@${DB_HOST}:${DB_PORT}/${MYSQL_DATABASE}
      JWT_SECRET: ${JWT_SECRET}
      PORT: ${BACKEND_PORT}
    ports:
      - "${BACKEND_PORT}:3000"
      - "5555:5555"
    volumes:
    - ./backend:/app

  frontend:
    build:
      context: ./frontend
    container_name: techx_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT}:4200"
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  mysql_data: